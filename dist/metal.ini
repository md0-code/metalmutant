# Metal Mutant — configuration
# Lines starting with # or ; are comments.

# Folder with the original game files (.IO), relative to this exe.
data=data

# 1 = start fullscreen, 0 = windowed. Alt+Enter toggles at runtime.
fullscreen=0

# Window scale factor: 1..4 (ignored in fullscreen).
scale=3

# 1 = no sound.
mute=0

# Translation file, relative to this exe. Comment out for original French.
language=translations\english.txt

# 1 = enable cheat hotkeys: F8 turbo, F7 slow motion,
# F6 infinite power (one-time F5 calibration, see README.txt).
cheats=1
