# Metal Mutant — configuration (Miyoo Mini / Allium)
# Lines starting with # or ; are comments.

# Folder with the original game files (.IO), relative to this package.
data=data

# Translation file. Comment out for original French.
language=translations/english.txt

# 1 = no sound.
mute=0

# 1 = enable cheat buttons: R1 turbo, L1 slow motion,
# X infinite power (one-time Y calibration, see README-MIYOO.txt).
cheats=1

# fullscreen/scale are ignored on the Miyoo: the game always fills the panel.
